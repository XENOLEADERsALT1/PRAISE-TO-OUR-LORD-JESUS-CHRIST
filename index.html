<!DOCTYPE html>
<html>
<head>
    <title>Video Player</title>
    <style>
        body { margin:0; background:black; height:100vh; overflow:hidden; cursor: none; }
        video { width: 100vw; height: 100vh; object-fit: cover; }
        #click-trigger { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; }
    </style>
</head>
<body>

    <div id="click-trigger" onclick="startMedia()"></div>

    <video id="myVideo" preload="auto">
        <source src="assets/video.mp4" type="video/mp4">
    </video>

    <audio id="myAudio" preload="auto">
        <source src="assets/audio.wav" type="audio/wav">
    </audio>

    <script>
        const video = document.getElementById('myVideo');
        const audio = document.getElementById('myAudio');
        const trigger = document.getElementById('click-trigger');

        function startMedia() {
            trigger.style.display = 'none';
            video.play();
            audio.play();
        }

        // Trigger action when video finishes
        video.onended = function() {
            // Attempt to close the current tab
            window.close();
            
            // Fallback: If browser blocks window.close(), show this message
            document.body.style.cursor = 'default';
            document.body.innerHTML = `
                <div style="color:white; font-family:sans-serif; text-align:center; padding-top:20vh;">
                    <h1>Sequence Complete</h1>
                    <p>Browser security prevented auto-close. You may close this tab now.</p>
                </div>`;
        };
    </script>
</body>
</html>
